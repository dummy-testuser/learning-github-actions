name: My first workflow

on: [push, workflow_dispatch]

jobs:
  first-job:
    runs-on: ubuntu-latest
    steps:
      - name: List all files
        run: ls -a
      - name: Print working directory
        run: pwd
      - name: Create JS file
        run: echo 'console.log("Hello from github actions machine")' > app.js
      - name: Run NodeJS file
        run: node app.js
      - name: Again list all files
        run: ls -a
