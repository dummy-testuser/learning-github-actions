name: My first workflow

on: [push, workflow_dispatch]

jobs:
  first-job:
    runs-on: ubuntu-latest
    steps:
      - name: List all files
        run: ls -a
      - name: Print Working Directory
        run: pwd

  second-job:
    runs-on: ubuntu-latest
    needs: first-job

    steps:
      - run: node -v
      - run: npm -v
