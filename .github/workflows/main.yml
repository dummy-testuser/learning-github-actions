name: My first workflow

on: [push, workflow_dispatch]

jobs:
  first-job:
    runs-on: ubuntu-latest
    steps:
      - name: List all files
        run: ls -a
      - name: Print working directory
        run: pwd 

  second-job:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        run: git clone https://github.com/saifraja07/Custom-CICD-Server.git

      - name: List files
        run: ls -la Custom-CICD-Server

      - name: Install dependencies
        working-directory: Custom-CICD-Server
        run: npm install

      - name: Start server
        working-directory: Custom-CICD-Server
        run: node app.js

      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
